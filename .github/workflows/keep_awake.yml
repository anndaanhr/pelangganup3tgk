name: Keep Server Awake

on:
  schedule:
    # Run every 10 minutes to prevent Render Free Tier from going to sleep (sleeps at 15m)
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API Health Endpoint
        run: |
          echo "Pinging the Render health endpoint..."
          curl -sS https://pelangganup3tgk.onrender.com/health || echo "Ping failed but continuing"

      - name: Ping Frontend Endpoint
        run: |
          echo "Pinging the Vercel frontend endpoint..."
          curl -sS https://pelangganup3tgk.vercel.app/ || echo "Ping failed but continuing"
