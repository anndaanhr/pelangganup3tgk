version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pln_postgres
    environment:
      POSTGRES_DB: pln_trend_db
      POSTGRES_USER: pln_user
      POSTGRES_PASSWORD: pln_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pln_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

